<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>DarkPause Pro</title>
    <style>
        body {
            width: 300px;
            background-color: #000;
            color: #0f0;
            font-family: 'Courier New', Courier, monospace;
            padding: 15px;
            border: 1px solid #333;
        }
        h2 { border-bottom: 1px solid #0f0; padding-bottom: 5px; }
        .status { color: #fff; margin-bottom: 10px; }
        button {
            background: #111;
            color: #0f0;
            border: 1px solid #0f0;
            padding: 8px;
            width: 100%;
            cursor: pointer;
        }
        button:hover { background: #0f0; color: #000; }
    </style>
</head>
<body>
    <h2 data-i18n="app_name">DarkPause Pro</h2>
    <div class="status">System: <span id="status-text">Active</span></div>
    <button id="save-btn" data-i18n="btn_save">Settings</button>
    <script src="options.js"></script>
</body>
</html>
